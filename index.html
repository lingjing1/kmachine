<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建置中</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Inter:wght@400;500&display=swap');

  :root {
    --ink: #F2EFE9;
    --ink-dim: #9AA3B2;
    --bg: #10151F;
    --bg-deep: #0A0E15;
    --accent: #C9A876;
    --line: rgba(242, 239, 233, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% -10%, #17202E 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .grid-mark {
    position: absolute;
    inset: -60px -40px;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%);
    mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%);
    pointer-events: none;
  }

  .eyebrow {
    position: relative;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 22px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 10px;
    vertical-align: middle;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  h1 {
    position: relative;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(38px, 7vw, 58px);
    line-height: 1.15;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }

  .underline {
    position: relative;
    width: 120px;
    height: 10px;
    margin: 18px auto 30px;
  }

  .underline svg { width: 100%; height: 100%; }

  .underline path {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 160;
    stroke-dashoffset: 160;
    animation: draw 1.4s 0.3s ease-out forwards;
  }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  p.desc {
    position: relative;
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1.7;
    max-width: 380px;
    margin: 0 auto;
  }

  .foot {
    position: relative;
    margin-top: 48px;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .eyebrow::before { animation: none; }
    .underline path { animation: none; stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid-mark"></div>
    <div class="eyebrow">Under Construction</div>
    <h1>正在<em>打造</em>中</h1>
    <div class="underline">
      <svg viewBox="0 0 120 10" preserveAspectRatio="none">
        <path d="M2,6 Q30,2 60,6 T118,5" />
      </svg>
    </div>
    <p class="desc">這裡即將是全新的網站。我們正在準備內容,完成後就會與你見面,敬請期待。</p>
    <div class="foot">© 2026 — 網站建置中</div>
  </div>
</body>
</html>
